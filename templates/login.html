{% extends "layout.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">로그인</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" name="username" required placeholder="아이디를 입력하세요">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" required placeholder="비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn-primary">로그인</button>
    </form>

    <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem;">
        <p>계정이 없으신가요? <a href="{{ url_for('signup') }}" style="color: var(--primary);">회원가입</a></p>
    </div>

    <div class="card"
        style="margin-top: 2rem; background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.2);">
        <h4 style="font-size: 0.875rem; color: var(--accent); margin-bottom: 0.5rem;">💡 테스트용 데모 계정</h4>
        <p style="font-size: 0.8125rem;">ID: <code>demo</code> / PW: <code>demo1234</code></p>
    </div>
</div>
{% endblock %}
