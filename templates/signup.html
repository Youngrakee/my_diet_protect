{% extends "layout.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">회원가입</h2>
    <form action="{{ url_for('signup') }}" method="POST">
        <div class="form-group">
            <label>새 아이디</label>
            <input type="text" name="username" required placeholder="사용할 아이디를 입력하세요">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" required placeholder="사용할 비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn-primary">가입하기</button>
    </form>

    <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem;">
        <p>이미 계정이 있으신가요? <a href="{{ url_for('login') }}" style="color: var(--primary);">로그인</a></p>
    </div>
</div>
{% endblock %}
